name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'app/**'  # OpenAPI 스펙 변경 감지
      - 'README.md'  # include-markdown → index.en.md
      - 'README.ko.md'  # include-markdown → index.ko.md
      - 'CHANGELOG.md'  # include-markdown → changelog.*.md
      - 'CODE_OF_CONDUCT.md'  # include-markdown → code-of-conduct.*.md
      - 'CONTRIBUTING.md'  # include-markdown → contributing.en.md
      - 'CONTRIBUTING.ko.md'  # include-markdown → contributing.ko.md
      - 'LICENSE'  # include-markdown → license.*.md
      - 'SECURITY.md'  # include-markdown → security.*.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-swagger-ui-tag mkdocs-static-i18n mkdocs-include-markdown-plugin
          pip install -r requirements.txt

      - name: Generate OpenAPI JSON
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          python -c "
          import os
          os.environ['OIDC_ENABLED'] = 'false'
          os.environ['DATABASE_URL'] = 'sqlite:///:memory:'
          os.environ['APP_VERSION'] = '$VERSION'
          from app.main import app
          import json
          with open('docs/api/openapi.json', 'w') as f:
              json.dump(app.openapi(), f, indent=2)
          "

      - name: Fetch OG preview image
        continue-on-error: true
        run: |
          mkdir -p docs/assets
          curl -sfL --max-time 5 "https://opengraph.githubassets.com/1/onprem-hipster-timer/backend" -o docs/assets/preview.png

      - name: Build MkDocs
        run: mkdocs build # --strict

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
